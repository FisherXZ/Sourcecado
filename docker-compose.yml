services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sourcecado}
      POSTGRES_USER: ${POSTGRES_USER:-sourcecado}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sourcecado}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
